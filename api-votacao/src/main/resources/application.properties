spring.application.name=api-votacao
spring.threads.virtual.enabled=true
# ===============================
# SERVIDOR
# ===============================
server.port=8080

# ===============================
# BANCO DE DADOS (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/db_votacao
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# FLYWAY (Versionamento de Banco)
# ===============================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ===============================
# KAFKA (Mensageria)
# ===============================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=votacao-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=br.com.yuri.votacao.dto

app.kafka.vote-topic=votos-topic
app.cpf-validator.base-url=http://localhost:8080
